<?xml version="1.0" encoding="UTF-8"?>
<!--
  WinDesktopMgr favicon. 32x32 base view-box, scales cleanly to 16/48/64.
  Design: cyan rounded square with a white "W" monogram + a small pulse
  line beneath it (suggesting "system monitoring"). Renders identifiably
  even at 16x16 — the W stays legible because it's a heavy stroke shape
  rather than a thin font glyph.
  Critical-state overlay (red dot in upper-right) is added at runtime
  by the JS dynamic-favicon helper, not baked into this base file.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Cyan rounded background -->
  <rect x="1" y="1" width="30" height="30" rx="6" ry="6" fill="#00d4ff"/>
  <!-- White W monogram, drawn as a polyline so it stays sharp at 16px.
       The W is 5 segments forming the M-shape: top-left down to mid-low,
       up to inner-top, down to mid-low, up to top-right. -->
  <polyline points="6,8 10,22 13,14 16,22 19,14 22,22 26,8"
            fill="none" stroke="#0d1117" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tiny pulse line at the bottom: small flat-spike-flat to suggest
       "heartbeat / monitor" without crowding the 32x32 canvas -->
  <polyline points="7,27 11,27 13,25 15,28 17,26 21,27 25,27"
            fill="none" stroke="#0d1117" stroke-width="1.2"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
</svg>
