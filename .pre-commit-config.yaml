repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        args: [--check]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        # -n auto parallelises across CPU cores via pytest-xdist (backlog #30).
        # Cuts pre-commit pytest from ~3m37s to ~48s on a 10-core box. Each
        # worker is its own Python process; tmp_path + autouse reset_globals
        # keep state isolated per worker.
        entry: python -m pytest tests/ -n auto -x -q --no-header
        language: system
        pass_filenames: false
        files: '\.py$'
        stages: [pre-commit]

      - id: pytest-integration
        name: pytest-integration (real PowerShell)
        # Integration tests stay SERIAL: they shell out to real PowerShell /
        # WMI / nvidia-smi / network probes and aren't safe to run in parallel
        # (rate limits, exclusive Windows resources, output-ordering matters).
        entry: python -m pytest -m integration -x -q --no-header --no-cov
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: lint-setinterval
        name: lint-setinterval (no unguarded timer leaks in index.html)
        entry: python scripts/lint_setinterval.py
        language: system
        pass_filenames: false
        files: 'templates/index\.html$'
        stages: [pre-commit]
