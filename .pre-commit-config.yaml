repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        args: [--check]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest tests/ -x -q --no-header
        language: system
        pass_filenames: false
        files: '\.py$'
        stages: [pre-commit]

      - id: pytest-integration
        name: pytest-integration (real PowerShell)
        entry: python -m pytest -m integration -x -q --no-header --no-cov
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
